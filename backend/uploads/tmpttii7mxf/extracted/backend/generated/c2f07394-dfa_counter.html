<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анимированный CSS Счётчик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .counter-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .counter-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .counter {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            display: inline-block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .counter::after {
            content: '%';
            font-size: 60px;
            color: #764ba2;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-top: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            width: 0%;
            animation: progressFill 5s ease-out forwards;
        }

        @keyframes progressFill {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        /* Анимация появления числа */
        @keyframes countUp {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            10% {
                opacity: 1;
                transform: scale(1.1);
            }
            20% {
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .counter {
            animation: countUp 5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="counter-container">
        <h1 class="counter-title">Анимированный счётчик</h1>
        <div class="counter" id="counter">0</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <button class="restart-btn" onclick="restartAnimation()">Перезапустить</button>
        <p class="info">Анимация длится 5 секунд</p>
    </div>

    <script>
        function animateCounter() {
            const counter = document.getElementById('counter');
            const progress = document.getElementById('progress');
            const duration = 5000; // 5 секунд
            const start = 0;
            const end = 100;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progressRatio = Math.min(elapsed / duration, 1);
                
                // Easing функция для плавности
                const easeOutQuart = 1 - Math.pow(1 - progressRatio, 4);
                
                const current = Math.floor(start + (end - start) * easeOutQuart);
                counter.textContent = current;
                
                if (progressRatio < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        function restartAnimation() {
            const counter = document.getElementById('counter');
            const progress = document.getElementById('progress');
            
            // Сбрасываем значения
            counter.textContent = '0';
            progress.style.animation = 'none';
            progress.offsetHeight; // Trigger reflow
            progress.style.animation = 'progressFill 5s ease-out forwards';
            
            // Запускаем анимацию счётчика
            animateCounter();
        }

        // Запускаем анимацию при загрузке страницы
        window.onload = animateCounter;
    </script>
</body>
</html>
