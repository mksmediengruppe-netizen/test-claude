<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff"/>
  
  <!-- Outer Circle -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#0066CC" stroke-width="3"/>
  
  <!-- Inner Circle -->
  <circle cx="200" cy="200" r="120" fill="#0066CC" opacity="0.1"/>
  
  <!-- SA Letters - Minimalist Design -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#0066CC" text-anchor="middle">SA</text>
  
  <!-- Small accent dots -->
  <circle cx="200" cy="260" r="6" fill="#004499"/>
  <circle cx="185" cy="260" r="4" fill="#3399FF"/>
  <circle cx="215" cy="260" r="4" fill="#3399FF"/>
  
  <!-- Company Name -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="24" font-weight="normal" fill="#004499" text-anchor="middle" letter-spacing="4">SUPER AGENT</text>
</svg>